services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: projeto_camila
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d projeto_camila"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://n8n:5678/
      GENERIC_TIMEZONE: America/Sao_Paulo
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    image: projeto-camila-app:local
    environment:
      NODE_ENV: development
      PORT: 3333
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/projeto_camila
      N8N_BASE_URL: http://n8n:5678
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ""
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
      WEBHOOK_SECRET: dev-secret-change-me
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    command: sh -c "pnpm db:migrate && pnpm dev:api"
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_started

  worker:
    build: .
    image: projeto-camila-app:local
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/projeto_camila
      N8N_BASE_URL: http://n8n:5678
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ""
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      WEBHOOK_SECRET: dev-secret-change-me

    command: pnpm dev:worker

    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  postgres_data:
  n8n_data:
